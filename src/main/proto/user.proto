syntax= "proto3";

option java_package = "com.vida.usuario.grpc";
option java_multiple_files=true;

package user;

service UserService{
  rpc registrar (UserCreateRequest) returns (UserResponse);
}

message  UserCreateRequest{
  string nombres = 1;
  string apellidos = 2;
  string email = 3;
  string password = 4;
  string telefono = 5;
}

message UserResponse {
  int64 id = 1;
  string nombres = 2;
  string apellidos = 3;
  string email = 4;
  string estado = 5;
  string telefono = 6;
}
