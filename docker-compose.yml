services:
  user-service:
    build: .
    container_name: user_service_app
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - DB_HOST=db-user
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - GRPC_SERVER_PORT=9090
      - DEBUG_LEVEL=${DEBUG_LEVEL}
    depends_on:
      db-user:
        condition: service_healthy
  # --- BASE DE DATOS ---
  db-user:
    image: postgres:15
    container_name: postgres_user_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MONITOREO (Prometheus) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_user
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - db-user

  # --- VISUALIZACIÓN (Grafana) ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_user
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
