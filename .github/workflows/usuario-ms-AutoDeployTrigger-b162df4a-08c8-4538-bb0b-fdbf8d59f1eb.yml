name: Trigger auto deployment for usuario-ms

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ config-evirot ]
    paths:
    - '**'
    - '.github/workflows/usuario-ms-AutoDeployTrigger-b162df4a-08c8-4538-bb0b-fdbf8d59f1eb.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.USUARIOMS_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.USUARIOMS_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.USUARIOMS_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.USUARIOMS_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.USUARIOMS_REGISTRY_PASSWORD }}
          containerAppName: usuario-ms
          resourceGroup: PostrgeUsuarioMicroservicio
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


