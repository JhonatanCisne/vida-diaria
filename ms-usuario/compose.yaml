services:
  usuario-ms:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: ms-usuario
    ports:
      - "8080:8080"
      - "9091:9090"
    environment:
      - SPRING_R2DBC_URL=r2dbc:postgresql://db-usuario:5432/${DB_NAME}
      - SPRING_R2DBC_USERNAME=${DB_USERNAME}
      - SPRING_R2DBC_PASSWORD=${DB_PASSWORD}
      - USUARIO_API_KEY=${USUARIO_API_KEY}
      - DEBUG_LEVEL=${DEBUG_LEVEL}
    depends_on:
      db-usuario:
        condition: service_healthy
    networks:
      - vida-network

  db-usuario:
    image: postgres:15-alpine
    container_name: postgres-usuario
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data_usuario:/var/lib/postgresql/data
    networks:
      - vida-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_user
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090" # Puerto estándar de Prometheus
    depends_on:
      - db-usuario
    networks:
      - vida-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_user
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - vida-network

networks:
  vida-network:
    driver: bridge

volumes:
  pg_data_usuario:
